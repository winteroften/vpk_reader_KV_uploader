name: Build and Release EXE

on:
  push:
    tags:
      - 'v*' # 仅当推送形如 v1.0.0 的 tag 时触发构建

permissions:
  contents: write # 允许创建 Release 的权限

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10' # 推荐使用稳定的 Python 版本
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller
        run: |
          # 自动将 main.py 中的 VERSION 替换为当前的 tag 名称
          # github.ref_name 包含了触发 workflow 的 tag 名称，如 v1.0.18
          (Get-Content main.py) -replace 'VERSION = ".*"', 'VERSION = "${{ github.ref_name }}"' | Set-Content main.py
          pyinstaller --noconsole --onefile --name L4D2_VPK_Reader main.py

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: dist/L4D2_VPK_Reader.exe
          generate_release_notes: true
